version: "3.8"

networks:
  hospital-network:

services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql-container
    restart: always
    networks:
      - hospital-network

    env_file:
      - .env

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./hospital.sql:/docker-entrypoint-initdb.d/hospital.sql

    ports:
      - "3306:3306"

  app:
    image: harshitha30galla/hospital-app:1.0
    container_name: hospital-app
    restart: always
    depends_on:
      - mysql

    networks:
      - hospital-network

    env_file:
      - .env

    ports:
      - "3000:3000"

volumes:
  mysql_data:
